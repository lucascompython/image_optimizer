[package]
name = "image_optimizer"
version = "0.1.0"
edition = "2024"

[dependencies]
image = { version = "0.25", default-features = false, features = [
    "rayon",
    "png",
    "jpeg",
] }
fast_image_resize = { version = "5.3", features = ["rayon"] }
rayon = "1" # look at orx-parallel
mimalloc = "0.1"
webp = { git = "https://github.com/lucascompython/webp", branch = "main" }

clap = { version = "4.5", features = ["derive"] }

[profile.release]
lto = true
codegen-units = 1
panic = "abort"
strip = true
